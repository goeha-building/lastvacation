<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Real-time Motion App</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .container { display: flex; width: 100vw; height: 100vh; }
        .panel { flex: 1; position: relative; border-right: 1px solid #444; }
        #right-panel { border-right: none; background: #000; }
        /* 비디오 숨기기 (캔버스에 직접 그림) */
        #input_video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #output_canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; }
        button { background: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:active { background: #ff4444; color: #fff; }
        .ui-label { position: absolute; top: 10px; left: 10px; font-size: 12px; color: #0f0; text-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="left-panel" class="panel">
            <div class="ui-label">LIVE_FEED_01</div>
            <video id="input_video" playsinline></video>
            <canvas id="output_canvas"></canvas>
            <div class="controls">
                <button id="record-btn">REC START</button>
            </div>
        </div>
        <div id="right-panel" class="panel">
            <div class="ui-label">VISUALIZER_CORE</div>
            <div id="canvas-holder"></div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const outCanvas = document.getElementById('output_canvas');
        const outCtx = outCanvas.getContext('2d');
        
        let hands, camera;
        let showEffect = false;
        let particles = [];
        let isRecording = false;
        let mediaRecorder;
        let recordedChunks = [];

        // p5.js (우측 화면)
        function setup() {
            const c = createCanvas(windowWidth / 2, windowHeight);
            c.parent('canvas-holder');
            initMediaPipe();
        }

        function initMediaPipe() {
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onResults);

            camera = new Camera(videoElement, {
                onFrame: async () => {
                    // 실시간성 핵심: 프레임마다 hands 데이터를 보냄
                    await hands.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            camera.start();
        }

        function onResults(results) {
            // 1. 좌측 웹캠 실시간 드로잉 (가장 중요)
            outCanvas.width = videoElement.videoWidth;
            outCanvas.height = videoElement.videoHeight;
            
            outCtx.save();
            outCtx.clearRect(0, 0, outCanvas.width, outCanvas.height);
            outCtx.drawImage(results.image, 0, 0, outCanvas.width, outCanvas.height);
            outCtx.restore();

            // 2. 포즈 감지 로직
            showEffect = false;
            if (results.multiHandLandmarks && results.multiHandLandmarks.length === 2) {
                let checkCount = 0;
                for (const landmarks of results.multiHandLandmarks) {
                    // 검지(8), 중지(12), 엄지(4)가 펴져 있는지 간단 체크
                    if (landmarks[8].y < landmarks[6].y && 
                        landmarks[12].y < landmarks[10].y && 
                        landmarks[4].y < landmarks[3].y) {
                        checkCount++;
                    }
                }
                if (checkCount === 2) showEffect = true;
            }
        }

        function draw() {
            background(0);
            
            if (showEffect) {
                // 파티클 생성
                if (particles.length < 120) particles.push(new Part());
                
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].run();
                    if (particles[i].isDead()) particles.splice(i, 1);
                }

                // 텍스트 출력
                fill(255);
                noStroke();
                textAlign(CENTER, CENTER);
                textSize(width * 0.08);
                text("SHUT YOUR BITCH ASS UP", width/2, height/2);
            } else {
                particles = [];
            }
        }

        class Part {
            constructor() {
                this.pos = createVector(width/2, height/2);
                this.vel = p5.Vector.random2D().mult(random(2, 8));
                this.acc = createVector(0, 0.05);
                this.life = 255;
                this.c = color(random(100,255), random(100,255), 255);
            }
            run() {
                this.vel.add(this.acc);
                this.pos.add(this.vel);
                this.life -= 5;
                noStroke();
                fill(red(this.c), green(this.c), blue(this.c), this.life);
                ellipse(this.pos.x, this.pos.y, 10);
            }
            isDead() { return this.life < 0; }
        }

        // 녹화 로직
        const btn = document.getElementById('record-btn');
        btn.onclick = () => {
            if (!isRecording) {
                const stream = document.querySelector('#canvas-holder canvas').captureStream(30);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                recordedChunks = [];
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'output.webm'; a.click();
                };
                mediaRecorder.start();
                isRecording = true;
                btn.innerText = "STOP REC";
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.innerText = "REC START";
            }
        };

        function windowResized() {
            resizeCanvas(windowWidth / 2, windowHeight);
        }
    </script>
</body>
</html>
