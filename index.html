<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Motion Visualizer Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        .container { display: flex; width: 100vw; height: 100vh; }
        .panel { flex: 1; position: relative; border-right: 1px solid #222; }
        #right-panel { border-right: none; background: #000; }
        #input_video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #output_canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); filter: brightness(1.2) contrast(1.1); }
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; }
        button { background: #fff; border: 2px solid #fff; padding: 12px 24px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #000; color: #fff; }
        .ui-label { position: absolute; top: 15px; left: 15px; font-size: 10px; color: #ff0055; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="left-panel" class="panel">
            <div class="ui-label">CAM_INPUT // ANALYSIS</div>
            <video id="input_video" playsinline></video>
            <canvas id="output_canvas"></canvas>
            <div class="controls">
                <button id="record-btn">RECORD SYSTEM</button>
            </div>
        </div>
        <div id="right-panel" class="panel">
            <div class="ui-label">MOTION_FX // GENERATIVE</div>
            <div id="canvas-holder"></div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const outCanvas = document.getElementById('output_canvas');
        const outCtx = outCanvas.getContext('2d');
        
        let hands, camera;
        let currentMode = "NONE"; // "NONE", "SHUT", "FUCK"
        let particles = [];

        function setup() {
            const c = createCanvas(windowWidth / 2, windowHeight);
            c.parent('canvas-holder');
            initMediaPipe();
        }

        function initMediaPipe() {
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });

            hands.onResults(onResults);

            camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 640, height: 480
            });
            camera.start();
        }

        function onResults(results) {
            outCanvas.width = videoElement.videoWidth;
            outCanvas.height = videoElement.videoHeight;
            outCtx.save();
            outCtx.clearRect(0, 0, outCanvas.width, outCanvas.height);
            outCtx.drawImage(results.image, 0, 0, outCanvas.width, outCanvas.height);
            outCtx.restore();

            // 모션 감지 로직
            currentMode = "NONE";
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                let shutCount = 0;
                let fuckCount = 0;

                for (const landmarks of results.multiHandLandmarks) {
                    // 손가락 상태 체크 (y좌표가 작을수록 위쪽)
                    const thumbUp = landmarks[4].y < landmarks[3].y;
                    const indexUp = landmarks[8].y < landmarks[6].y;
                    const middleUp = landmarks[12].y < landmarks[10].y;
                    const ringUp = landmarks[16].y < landmarks[14].y;
                    const pinkyUp = landmarks[20].y < landmarks[18].y;

                    // 1. SHUT 포즈 (엄지, 검지, 중지만 펴짐)
                    if (thumbUp && indexUp && middleUp && !ringUp && !pinkyUp) {
                        shutCount++;
                    }
                    
                    // 2. FUCK 포즈 (중지만 펴짐)
                    if (middleUp && !indexUp && !ringUp && !pinkyUp) {
                        fuckCount++;
                    }
                }

                if (shutCount >= 2) currentMode = "SHUT";
                else if (fuckCount >= 1) currentMode = "FUCK";
            }
        }

        function draw() {
            background(0);
            
            if (currentMode !== "NONE") {
                // 입자 생성량 대폭 증가 및 크기 다양화
                for (let i = 0; i < 5; i++) {
                    particles.push(new Part(currentMode));
                }
                
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update(currentMode);
                    particles[i].show();
                    if (particles[i].isDead()) particles.splice(i, 1);
                }

                // 텍스트 출력
                fill(255);
                noStroke();
                textAlign(CENTER, CENTER);
                
                if (currentMode === "SHUT") {
                    textSize(width * 0.07);
                    text("SHUT YOUR BITCH ASS UP", width/2, height/2);
                } else if (currentMode === "FUCK") {
                    textSize(width * 0.15);
                    fill(255, 0, 80);
                    text("FUCK YOU", width/2, height/2);
                }
            } else {
                particles = [];
            }
        }

        class Part {
            constructor(mode) {
                this.pos = createVector(width/2, height/2);
                this.vel = p5.Vector.random2D().mult(random(2, 10));
                this.acc = createVector(0, 0);
                this.life = 255;
                this.size = random(3, 15); // 크기 다양화
                this.angle = random(TWO_PI);
                this.mode = mode;
                
                if (mode === "FUCK") {
                    this.c = color(random(150, 255), 0, random(50, 150)); // 붉은색 계열
                } else {
                    this.c = color(random(100, 255), random(100, 255), 255); // 무지개/푸른색 계열
                }
            }
            
            update(mode) {
                if (mode === "FUCK") {
                    // 소용돌이 로직
                    let r = dist(this.pos.x, this.pos.y, width/2, height/2);
                    let xOffset = cos(this.angle) * 5;
                    let yOffset = sin(this.angle) * 5;
                    this.pos.x += xOffset;
                    this.pos.y += yOffset;
                    this.angle += 0.2;
                    this.vel.mult(1.02); // 점점 빨라짐
                }
                
                this.pos.add(this.vel);
                this.life -= 4;
            }
            
            show() {
                noStroke();
                fill(red(this.c), green(this.c), blue(this.c), this.life);
                ellipse(this.pos.x, this.pos.y, this.size);
            }
            
            isDead() { return this.life < 0; }
        }

        // 녹화 기능
        let isRecording = false;
        let mediaRecorder;
        let recordedChunks = [];
        const btn = document.getElementById('record-btn');
        
        btn.onclick = () => {
            if (!isRecording) {
                const stream = document.querySelector('#canvas-holder canvas').captureStream(30);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                recordedChunks = [];
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'f-word-motion.webm'; a.click();
                };
                mediaRecorder.start();
                isRecording = true;
                btn.innerText = "STOP RECORDING";
                btn.style.borderColor = "#ff0000";
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.innerText = "RECORD SYSTEM";
                btn.style.borderColor = "#fff";
            }
        };

        function windowResized() {
            resizeCanvas(windowWidth / 2, windowHeight);
        }
    </script>
</body>
</html>
