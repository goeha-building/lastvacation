<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Visualizer</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .container { display: flex; width: 100vw; height: 100vh; }
        .panel { flex: 1; position: relative; border: 1px solid #333; overflow: hidden; }
        #left-panel { background: #111; display: flex; align-items: center; justify-content: center; }
        #right-panel { background: #000; }
        video { transform: rotateY(180deg); width: 100%; height: auto; display: none; }
        canvas { width: 100% !important; height: 100% !important; object-fit: contain; }
        .controls { position: absolute; bottom: 20px; left: 20px; z-index: 10; }
        button { background: #fff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ccc; }
        .status { position: absolute; top: 20px; left: 20px; color: #0f0; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="left-panel" class="panel">
            <video id="input_video"></video>
            <canvas id="output_canvas"></canvas>
            <div class="status">SYSTEM ACTIVE</div>
            <div class="controls">
                <button id="record-btn">RECORD START</button>
            </div>
        </div>
        <div id="right-panel" class="panel">
            <div id="canvas-container"></div>
        </div>
    </div>
    <script src="sketch.js"></script>
</body>
</html>
